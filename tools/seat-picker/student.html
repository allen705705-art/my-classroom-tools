<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位志願填選</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --accent: #f59e0b;
      --accent2: #fb923c;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --ranked-bg: #1e3a5f;
      --green: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      padding: 16px;
    }
    h1 {
      text-align: center;
      color: var(--accent);
      font-size: 1.5rem;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    /* Student ID */
    .id-row {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .id-row label { color: var(--muted); font-size: 0.9rem; }
    .id-row input {
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 1.1rem;
      width: 100px;
      text-align: center;
    }
    .id-row input:focus { outline: none; border-color: var(--accent2); }

    /* Progress */
    .progress-bar-wrap {
      max-width: 400px;
      margin: 0 auto 6px;
      background: var(--surface);
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
      width: 0%;
      border-radius: 8px;
    }
    .progress-text {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .progress-text span { color: var(--accent); font-weight: bold; }

    /* Blackboard */
    .blackboard {
      text-align: center;
      background: #166534;
      color: #d1fae5;
      padding: 5px 0;
      border-radius: 4px 4px 0 0;
      max-width: 400px;
      margin: 0 auto;
      font-size: 0.85rem;
      letter-spacing: 6px;
    }

    /* Seat grid */
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      max-width: 400px;
      margin: 0 auto 16px;
      background: var(--surface);
      padding: 10px;
      border-radius: 0 0 8px 8px;
      border: 1px solid #374151;
      border-top: none;
    }
    .seat {
      aspect-ratio: 1;
      background: #111827;
      border: 2px solid #374151;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      position: relative;
      user-select: none;
    }
    .seat:hover { border-color: var(--accent); background: #1f2937; }
    .seat.ranked {
      background: var(--ranked-bg);
      border-color: var(--accent);
    }
    .seat.top3 { border-color: var(--accent2); background: #3d1a00; }
    .seat .seat-id { font-size: 0.75rem; color: var(--muted); }
    .seat .rank-num {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--accent);
      line-height: 1;
    }
    .seat.top3 .rank-num { color: var(--accent2); }
    .seat .rank-label {
      font-size: 0.55rem;
      color: var(--muted);
    }

    /* Action buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      max-width: 400px;
      margin: 0 auto 16px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #111827;
      flex: 1;
      max-width: 180px;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid #374151;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    /* Ranked list preview */
    .ranked-section {
      max-width: 400px;
      margin: 0 auto 16px;
    }
    .ranked-section h3 {
      color: var(--accent);
      font-size: 0.85rem;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ranked-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip {
      background: var(--ranked-bg);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .chip-rank { color: var(--muted); font-size: 0.68rem; }
    .chip-seat { color: var(--text); font-weight: bold; }

    /* Success */
    #successScreen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-title { color: var(--green); font-size: 1.5rem; margin-bottom: 8px; }
    .success-msg { color: var(--muted); font-size: 0.9rem; }
    .success-id { color: var(--accent); font-size: 1.1rem; margin-top: 12px; }

    /* Already submitted notice */
    .already-notice {
      display: none;
      background: #1e3a1e;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      text-align: center;
      max-width: 400px;
      margin: 0 auto 12px;
    }
  </style>
</head>
<body>

<div id="mainContent">
  <h1>🪑 座位志願填選</h1>
  <p class="subtitle">依喜好順序點選座位 → 第1個點選 = 第1志願</p>

  <div class="id-row">
    <label>座號</label>
    <input type="number" id="studentId" placeholder="1–36" min="1" max="36">
  </div>

  <div class="already-notice" id="alreadyNotice">⚠️ 此座號已送出過，再次送出將覆蓋舊紀錄</div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="progress-text">已排序 <span id="count">0</span> / 36 個座位</p>

  <div class="blackboard">▌ 黑　板 ▐</div>
  <div class="seat-grid" id="seatGrid"></div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="autoFillBtn">⚡ 自動填入剩餘</button>
    <button class="btn btn-ghost" id="resetBtn">🔄 重設</button>
  </div>

  <div class="ranked-section">
    <h3>📋 志願順序預覽</h3>
    <div class="ranked-chips" id="rankedChips"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="submitBtn" disabled>✅ 送出志願表</button>
  </div>
</div>

<div id="successScreen">
  <div class="success-icon">🎉</div>
  <h2 class="success-title">志願送出成功！</h2>
  <p class="success-msg">等老師公布座位分配結果</p>
  <p class="success-id" id="successId"></p>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAov-9uW6FZQmf41-PPJ4-plvqR-Bu6zg4",
    authDomain: "teaching-test-5fd1c.firebaseapp.com",
    projectId: "teaching-test-5fd1c",
    storageBucket: "teaching-test-5fd1c.firebasestorage.app",
    messagingSenderId: "404776287999",
    appId: "1:404776287999:web:6b14120c71c8962fe396ca"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TOTAL = 36;
  let ranking = []; // seat numbers in preference order

  // --- Build Grid ---
  const grid = document.getElementById('seatGrid');
  for (let i = 1; i <= TOTAL; i++) {
    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.dataset.seat = i;
    seat.innerHTML = `<span class="seat-id">${i}</span>`;
    seat.addEventListener('click', () => toggleSeat(i));
    grid.appendChild(seat);
  }

  function toggleSeat(seatNum) {
    const idx = ranking.indexOf(seatNum);
    if (idx === -1) {
      ranking.push(seatNum);
    } else {
      ranking.splice(idx, 1);
    }
    refreshAll();
  }

  function refreshAll() {
    // Update grid
    document.querySelectorAll('.seat').forEach(el => {
      const n = parseInt(el.dataset.seat);
      const rank = ranking.indexOf(n);
      if (rank === -1) {
        el.className = 'seat';
        el.innerHTML = `<span class="seat-id">${n}</span>`;
      } else {
        const r = rank + 1;
        el.className = r <= 3 ? 'seat ranked top3' : 'seat ranked';
        el.innerHTML = `
          <span class="rank-num">${r}</span>
          <span class="rank-label">${n}號</span>
        `;
      }
    });
    // Progress
    const pct = (ranking.length / TOTAL * 100).toFixed(0);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('count').textContent = ranking.length;
    // Submit btn
    document.getElementById('submitBtn').disabled = ranking.length < TOTAL;
    // Chips
    const chips = document.getElementById('rankedChips');
    chips.innerHTML = ranking.slice(0, 12).map((s, i) =>
      `<div class="chip"><span class="chip-rank">${i+1}</span><span class="chip-seat">${s}號</span></div>`
    ).join('') + (ranking.length > 12 ? `<div class="chip"><span class="chip-seat">...+${ranking.length - 12}</span></div>` : '');
  }

  // Auto-fill remaining seats in numeric order
  document.getElementById('autoFillBtn').addEventListener('click', () => {
    const remaining = [];
    for (let i = 1; i <= TOTAL; i++) {
      if (!ranking.includes(i)) remaining.push(i);
    }
    ranking = [...ranking, ...remaining];
    refreshAll();
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    ranking = [];
    refreshAll();
  });

  // Check if already submitted when ID changes
  document.getElementById('studentId').addEventListener('change', async () => {
    const id = parseInt(document.getElementById('studentId').value);
    if (!id || id < 1 || id > TOTAL) return;
    const snap = await getDoc(doc(db, 'seat_preferences', String(id).padStart(2, '0')));
    document.getElementById('alreadyNotice').style.display = snap.exists() ? 'block' : 'none';
  });

  // Submit
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const id = parseInt(document.getElementById('studentId').value);
    if (!id || id < 1 || id > TOTAL) {
      alert('請輸入正確的座號（1–36）');
      return;
    }
    if (ranking.length < TOTAL) {
      alert('請完成所有 36 個座位的排序，或使用「自動填入剩餘」');
      return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送出中…';
    try {
      await setDoc(doc(db, 'seat_preferences', String(id).padStart(2, '0')), {
        studentId: id,
        ranking,          // array[0]=最想要的座位, array[35]=最不想要的
        submittedAt: serverTimestamp()
      });
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';
      document.getElementById('successId').textContent = `座號 ${id} 號`;
    } catch (err) {
      console.error(err);
      alert('送出失敗，請重試');
      btn.disabled = false;
      btn.textContent = '✅ 送出志願表';
    }
  });
</script>
</body>
</html>
