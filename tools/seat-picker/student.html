<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位志願填選</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --accent: #f59e0b;
      --accent2: #fb923c;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --green: #22c55e;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 { text-align: center; color: var(--accent); font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.82rem; margin-bottom: 14px; }

    /* ID input */
    .id-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; margin-bottom: 14px;
    }
    .id-row label { color: var(--muted); font-size: 0.9rem; white-space: nowrap; }
    .id-row input {
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 1.1rem;
      width: 90px;
      text-align: center;
    }
    .id-row input:focus { outline: none; border-color: var(--accent2); }

    /* Progress */
    .progress-wrap {
      max-width: 100%; background: var(--surface);
      border-radius: 8px; height: 6px; overflow: hidden; margin-bottom: 6px;
    }
    .progress-bar {
      height: 100%; background: var(--accent);
      transition: width 0.25s; width: 0%; border-radius: 8px;
    }
    .progress-text {
      text-align: center; font-size: 0.8rem; color: var(--muted); margin-bottom: 10px;
    }
    .progress-text span { color: var(--accent); font-weight: bold; }

    /* Blackboard */
    .blackboard {
      text-align: center; background: #166534; color: #d1fae5;
      padding: 5px 0; border-radius: 4px 4px 0 0;
      font-size: 0.82rem; letter-spacing: 4px;
    }

    /* Seat grid 6 rows × 5 cols */
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      background: var(--surface);
      padding: 8px;
      border-radius: 0 0 8px 8px;
      border: 1px solid #374151;
      border-top: none;
      margin-bottom: 12px;
    }
    .seat {
      aspect-ratio: 1;
      background: #111827;
      border: 2px solid #374151;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      position: relative;
      user-select: none;
    }
    .seat:hover { border-color: var(--accent); }
    .seat.ranked { background: #1e3a5f; border-color: var(--accent); }
    .seat.top3   { background: #3d1a00; border-color: var(--accent2); }
    .seat .seat-label { font-size: 0.65rem; color: var(--muted); }
    .seat .rank-num  {
      font-size: 1rem; font-weight: bold;
      color: var(--accent); line-height: 1;
    }
    .seat.top3 .rank-num { color: var(--accent2); }
    .seat .rank-small { font-size: 0.5rem; color: var(--muted); }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .btn {
      padding: 7px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #111827; min-width: 120px; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid #374151; font-size: 0.82rem; padding: 6px 12px;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    /* Ranked preview chips */
    .ranked-section { margin-bottom: 14px; }
    .ranked-section h3 { color: var(--accent); font-size: 0.82rem; margin-bottom: 6px; }
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      background: #1e3a5f; border: 1px solid var(--accent);
      border-radius: 4px; padding: 2px 7px; font-size: 0.76rem;
      display: flex; align-items: center; gap: 3px;
    }
    .chip-r { color: var(--muted); font-size: 0.66rem; }
    .chip-s { color: var(--text); font-weight: bold; }

    /* Already submitted */
    .already-notice {
      display: none; background: #1a3a1a; border: 1px solid var(--green);
      color: var(--green); padding: 7px 12px; border-radius: 8px;
      font-size: 0.82rem; text-align: center; margin-bottom: 10px;
    }

    /* Success */
    #successScreen {
      display: none; text-align: center; padding: 60px 20px;
    }
    .suc-icon { font-size: 3.5rem; margin-bottom: 14px; }
    .suc-title { color: var(--green); font-size: 1.4rem; margin-bottom: 8px; }
    .suc-msg { color: var(--muted); font-size: 0.88rem; }
    .suc-id { color: var(--accent); font-size: 1rem; margin-top: 10px; }
  </style>
</head>
<body>

<div id="mainContent">
  <h1>🪑 座位志願填選</h1>
  <p class="subtitle">依喜好順序點選座位，第1個點選 = 第1志願（最想坐）</p>

  <div class="id-row">
    <label>我的座號</label>
    <input type="number" id="studentId" placeholder="1–30" min="1" max="30">
  </div>

  <div class="already-notice" id="alreadyNotice">⚠️ 此座號已送出，再次送出將覆蓋舊紀錄</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="progress-text">已排序 <span id="count">0</span> / 30 個座位</p>

  <div class="blackboard">▌ 黑　板 ▐</div>
  <div class="seat-grid" id="seatGrid"></div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="autoFillBtn">⚡ 自動填入剩餘</button>
    <button class="btn btn-ghost" id="resetBtn">🔄 重設</button>
  </div>

  <div class="ranked-section">
    <h3>📋 志願順序預覽（前12名）</h3>
    <div class="chips" id="chips"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="submitBtn" disabled>✅ 送出志願表</button>
  </div>
</div>

<div id="successScreen">
  <div class="suc-icon">🎉</div>
  <h2 class="suc-title">志願送出成功！</h2>
  <p class="suc-msg">等老師公布座位分配結果</p>
  <p class="suc-id" id="sucId"></p>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAov-9uW6FZQmf41-PPJ4-plvqR-Bu6zg4",
    authDomain: "teaching-test-5fd1c.firebaseapp.com",
    projectId: "teaching-test-5fd1c",
    storageBucket: "teaching-test-5fd1c.firebasestorage.app",
    messagingSenderId: "404776287999",
    appId: "1:404776287999:web:6b14120c71c8962fe396ca"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 6 rows × 5 cols = 30 seats, labeled "row-col"
  const ROWS = 5, COLS = 6, TOTAL = ROWS * COLS;
  const ALL_SEATS = [];
  for (let r = 1; r <= ROWS; r++)
    for (let c = 1; c <= COLS; c++)
      ALL_SEATS.push(`${r}-${c}`);

  let ranking = []; // seat IDs in preference order

  // Build grid
  const grid = document.getElementById('seatGrid');
  ALL_SEATS.forEach(seatId => {
    const el = document.createElement('div');
    el.className = 'seat';
    el.dataset.seat = seatId;
    el.innerHTML = `<span class="seat-label">${seatId}</span>`;
    el.addEventListener('click', () => toggle(seatId));
    grid.appendChild(el);
  });

  function toggle(seatId) {
    const idx = ranking.indexOf(seatId);
    if (idx === -1) ranking.push(seatId);
    else ranking.splice(idx, 1);
    refresh();
  }

  function refresh() {
    // Update each seat cell
    ALL_SEATS.forEach(seatId => {
      const el = grid.querySelector(`[data-seat="${seatId}"]`);
      const rank = ranking.indexOf(seatId);
      if (rank === -1) {
        el.className = 'seat';
        el.innerHTML = `<span class="seat-label">${seatId}</span>`;
      } else {
        const r = rank + 1;
        el.className = r <= 3 ? 'seat ranked top3' : 'seat ranked';
        el.innerHTML = `<span class="rank-num">${r}</span><span class="rank-small">${seatId}</span>`;
      }
    });
    // Progress
    const pct = (ranking.length / TOTAL * 100).toFixed(0);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('count').textContent = ranking.length;
    // Submit
    document.getElementById('submitBtn').disabled = ranking.length < TOTAL;
    // Chips preview (first 12)
    document.getElementById('chips').innerHTML =
      ranking.slice(0, 12).map((s, i) =>
        `<div class="chip"><span class="chip-r">${i+1}</span><span class="chip-s">${s}</span></div>`
      ).join('') +
      (ranking.length > 12 ? `<div class="chip"><span class="chip-s">…+${ranking.length - 12}</span></div>` : '');
  }

  // Auto-fill: add remaining seats in natural order
  document.getElementById('autoFillBtn').addEventListener('click', () => {
    ALL_SEATS.forEach(s => { if (!ranking.includes(s)) ranking.push(s); });
    refresh();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    ranking = [];
    refresh();
  });

  // Check existing submission
  document.getElementById('studentId').addEventListener('change', async () => {
    const id = parseInt(document.getElementById('studentId').value);
    if (!id || id < 1 || id > TOTAL) return;
    const snap = await getDoc(doc(db, 'seat_preferences', String(id).padStart(2, '0')));
    document.getElementById('alreadyNotice').style.display = snap.exists() ? 'block' : 'none';
  });

  // Submit
  document.getElementById('submitBtn').addEventListener('click', async () => {
    const id = parseInt(document.getElementById('studentId').value);
    if (!id || id < 1 || id > TOTAL) { alert('請輸入正確的座號（1–30）'); return; }
    if (ranking.length < TOTAL) { alert('請完成所有 30 個座位的排序，或使用「自動填入剩餘」'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '送出中…';
    try {
      await setDoc(doc(db, 'seat_preferences', String(id).padStart(2, '0')), {
        studentId: id,
        // ranking[0] = 最想要的座位（志願序1），ranking[29] = 最不想要
        ranking,
        submittedAt: serverTimestamp()
      });
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';
      document.getElementById('sucId').textContent = `座號 ${id} 號`;
    } catch (err) {
      console.error(err);
      alert('送出失敗，請重試');
      btn.disabled = false; btn.textContent = '✅ 送出志願表';
    }
  });
</script>
</body>
</html>
