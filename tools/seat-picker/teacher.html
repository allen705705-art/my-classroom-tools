<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位分配 — 老師控制台</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --accent: #f59e0b;
      --accent2: #fb923c;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh; padding: 16px;
    }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    h1 { color: var(--accent); font-size: 1.3rem; }
    .hdr-btns { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Card */
    .card {
      background: var(--surface); border-radius: 10px;
      padding: 14px; margin-bottom: 14px; border: 1px solid #374151;
    }
    .card h2 {
      color: var(--accent); font-size: 0.9rem;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    /* Stats */
    .stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat {
      flex: 1; min-width: 80px; background: var(--bg);
      border-radius: 8px; padding: 10px; text-align: center;
    }
    .stat-n { font-size: 1.8rem; font-weight: bold; color: var(--accent); line-height: 1; }
    .stat-l { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* Submission chips */
    .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip-done {
      background: #064e3b; border: 1px solid var(--green);
      color: var(--green); border-radius: 4px; padding: 2px 7px; font-size: 0.78rem;
    }
    .chip-todo {
      background: var(--bg); border: 1px solid #374151;
      color: var(--muted); border-radius: 4px; padding: 2px 7px; font-size: 0.78rem;
    }

    /* Buttons */
    .btn {
      padding: 7px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: all 0.2s;
    }
    .btn-accent { background: var(--accent); color: #111827; }
    .btn-accent:hover { background: var(--accent2); }
    .btn-accent:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid #374151; font-size: 0.8rem; padding: 5px 10px;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
    .btn-danger {
      background: transparent; color: var(--red);
      border: 1px solid var(--red); font-size: 0.8rem; padding: 5px 10px;
    }
    .btn-danger:hover { background: #450a0a; }

    /* Algorithm explanation */
    .algo-box {
      background: #1c2a3a; border: 1px solid var(--blue);
      border-radius: 6px; padding: 10px 12px; font-size: 0.8rem; color: var(--muted);
      margin-bottom: 10px; line-height: 1.6;
    }
    .algo-box strong { color: var(--blue); }

    /* Result controls */
    .result-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .note { font-size: 0.78rem; color: var(--muted); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 2px solid #374151; margin-bottom: 0; }
    .tab {
      padding: 7px 14px; cursor: pointer; font-size: 0.84rem;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; padding-top: 12px; }
    .tab-panel.active { display: block; }

    /* Seat grid result — 6 rows × 5 cols */
    .blackboard {
      text-align: center; background: #166534; color: #d1fae5;
      padding: 5px 0; border-radius: 4px 4px 0 0;
      font-size: 0.82rem; letter-spacing: 4px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      background: var(--surface);
      padding: 8px;
      border-radius: 0 0 8px 8px;
      border: 1px solid #374151;
      border-top: none;
      margin-bottom: 12px;
    }
    .cell {
      aspect-ratio: 1; border-radius: 6px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 0.75rem; position: relative; cursor: default;
    }
    .cell.empty {
      background: #111827; border: 2px dashed #374151; color: var(--muted);
    }
    .cell.assigned { border: 2px solid; }
    .cell .c-seat  { font-size: 0.55rem; color: var(--muted); }
    .cell .c-stu   { font-size: 1rem; font-weight: bold; }
    .cell .c-wish  {
      position: absolute; top: 2px; right: 4px;
      font-size: 0.5rem; font-weight: bold;
    }

    /* Wish rank color tiers */
    .w1  { background: #052e16; border-color: #16a34a !important; }
    .w1  .c-wish { color: #4ade80; }
    .w2  { background: #064e3b; border-color: #059669 !important; }
    .w2  .c-wish { color: #6ee7b7; }
    .w3  { background: #0d3d2b; border-color: #34d399 !important; }
    .w3  .c-wish { color: #a7f3d0; }
    .wm  { background: #1e3a5f; border-color: var(--blue) !important; }
    .wm  .c-wish { color: #93c5fd; }
    .wl  { background: #3d1a00; border-color: var(--accent2) !important; }
    .wl  .c-wish { color: #fdba74; }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 340px; }
    th {
      background: var(--bg); color: var(--muted);
      padding: 7px 10px; text-align: left; font-weight: normal; font-size: 0.76rem;
    }
    td { padding: 5px 10px; border-bottom: 1px solid #374151; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: 2px 7px;
      border-radius: 4px; font-size: 0.74rem; font-weight: bold;
    }
    .b1 { background: #052e16; color: #4ade80; }
    .b2 { background: #064e3b; color: #6ee7b7; }
    .b3 { background: #0d3d2b; color: #a7f3d0; }
    .bm { background: #1e3a5f; color: #93c5fd; }
    .bl { background: #3d1a00; color: #fdba74; }

    /* Legend */
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--muted); }
    .ld { width: 10px; height: 10px; border-radius: 2px; }

    /* Stats summary */
    .wish-summary { display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.78rem; margin-top: 12px; padding-top: 10px; border-top: 1px solid #374151; }

    /* Live dot */
    .live { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Tooltip on hover */
    .cell[title] { cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <h1>🎛️ 座位分配控制台</h1>
  <div class="hdr-btns">
    <button class="btn btn-danger" id="clearBtn">🗑️ 清除全部資料</button>
    <a href="student.html" target="_blank">
      <button class="btn btn-ghost">🔗 學生填選頁</button>
    </a>
  </div>
</div>

<!-- Status -->
<div class="card">
  <h2><span class="live"></span>&nbsp;即時狀態</h2>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="stN">0</div><div class="stat-l">已送出</div></div>
    <div class="stat"><div class="stat-n" id="stP" style="color:var(--muted)">30</div><div class="stat-l">未送出</div></div>
    <div class="stat"><div class="stat-n" id="stPct">0%</div><div class="stat-l">完成率</div></div>
  </div>
</div>

<!-- Submission list -->
<div class="card">
  <h2>📋 送出狀況</h2>
  <div class="chip-list" id="chipList"></div>
</div>

<!-- Run assignment -->
<div class="card">
  <h2>⚡ 執行座位分配</h2>
  <div class="algo-box">
    <strong>演算法：貪婪最佳配對</strong><br>
    對所有「(學生, 座位, 志願序)」三元組，依志願序<strong>由低到高</strong>排序（志願1最優先）。
    依序掃描：若該學生尚未得到座位、且該座位尚未被分配 → 立即配對。
    結果讓最多學生得到盡可能高的志願。
  </div>
  <div class="result-controls">
    <button class="btn btn-accent" id="assignBtn" disabled>🎯 執行座位分配</button>
    <button class="btn btn-ghost" id="reBtn" style="display:none">🔄 重新執行</button>
    <span class="note" id="assignNote">等待學生送出志願…</span>
  </div>
</div>

<!-- Results -->
<div class="card" id="resCard" style="display:none">
  <h2>🗺️ 分配結果</h2>
  <div class="tabs">
    <div class="tab active" data-panel="grid">格狀圖</div>
    <div class="tab" data-panel="table">列表</div>
  </div>

  <!-- Grid view -->
  <div class="tab-panel active" id="panelGrid">
    <div class="blackboard">▌ 黑　板 ▐</div>
    <div class="result-grid" id="resGrid"></div>
    <div class="legend">
      <div class="legend-item"><div class="ld" style="background:#052e16"></div>第1志願</div>
      <div class="legend-item"><div class="ld" style="background:#064e3b"></div>第2志願</div>
      <div class="legend-item"><div class="ld" style="background:#0d3d2b"></div>第3志願</div>
      <div class="legend-item"><div class="ld" style="background:#1e3a5f"></div>第4–10志願</div>
      <div class="legend-item"><div class="ld" style="background:#3d1a00"></div>第11志願以後</div>
    </div>
  </div>

  <!-- Table view -->
  <div class="tab-panel" id="panelTable">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>座號</th><th>分配座位</th><th>志願序</th><th>滿意度</th>
          </tr>
        </thead>
        <tbody id="resTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Wish stats -->
  <div class="wish-summary" id="wishSummary"></div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAov-9uW6FZQmf41-PPJ4-plvqR-Bu6zg4",
    authDomain: "teaching-test-5fd1c.firebaseapp.com",
    projectId: "teaching-test-5fd1c",
    storageBucket: "teaching-test-5fd1c.firebasestorage.app",
    messagingSenderId: "404776287999",
    appId: "1:404776287999:web:6b14120c71c8962fe396ca"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ROWS = 6, COLS = 5, TOTAL = ROWS * COLS;
  const ALL_SEATS = [];
  for (let r = 1; r <= ROWS; r++)
    for (let c = 1; c <= COLS; c++)
      ALL_SEATS.push(`${r}-${c}`);

  let subs = {}; // { studentId: { ranking: [...] } }

  // ---- Real-time listener ----
  onSnapshot(collection(db, 'seat_preferences'), snap => {
    subs = {};
    snap.forEach(d => { subs[d.data().studentId] = d.data(); });
    updateStatus();
  });

  function updateStatus() {
    const n = Object.keys(subs).length;
    document.getElementById('stN').textContent = n;
    document.getElementById('stP').textContent = TOTAL - n;
    document.getElementById('stPct').textContent = Math.round(n / TOTAL * 100) + '%';

    // Chip list (1–30)
    let html = '';
    for (let i = 1; i <= TOTAL; i++) {
      html += subs[i]
        ? `<div class="chip-done">${i}號</div>`
        : `<div class="chip-todo">${i}號</div>`;
    }
    document.getElementById('chipList').innerHTML = html;

    const canRun = n > 0;
    document.getElementById('assignBtn').disabled = !canRun;
    document.getElementById('assignNote').textContent =
      n === 0  ? '等待學生送出志願…' :
      n === TOTAL ? '全班已送出，可執行分配' :
      `已有 ${n}/30 人送出，可先執行`;
  }

  // ---- Algorithm: Greedy Matching by Preference Rank ----
  function assign() {
    // Build all (student, seat, rank) triples
    const triples = [];
    for (const [sid, data] of Object.entries(subs)) {
      data.ranking.forEach((seatId, idx) => {
        triples.push({ student: parseInt(sid), seat: seatId, rank: idx + 1 });
      });
    }
    // Sort by rank ascending → best preferences first
    triples.sort((a, b) => a.rank - b.rank);

    const usedStudents = new Set();
    const usedSeats    = new Set();
    // result[seatId] = { studentId, wishRank }
    const result = {};

    for (const { student, seat, rank } of triples) {
      if (!usedStudents.has(student) && !usedSeats.has(seat)) {
        result[seat] = { studentId: student, wishRank: rank };
        usedStudents.add(student);
        usedSeats.add(seat);
      }
    }
    return result;
  }

  function wishClass(r) {
    if (r === 1) return 'w1';
    if (r === 2) return 'w2';
    if (r === 3) return 'w3';
    if (r <= 10) return 'wm';
    return 'wl';
  }
  function badgeClass(r) {
    if (r === 1) return 'b1';
    if (r === 2) return 'b2';
    if (r === 3) return 'b3';
    if (r <= 10) return 'bm';
    return 'bl';
  }
  function emoji(r) {
    return r <= 3 ? '😊' : r <= 10 ? '🙂' : '😅';
  }

  function render(result) {
    // ---- Grid ----
    const grid = document.getElementById('resGrid');
    grid.innerHTML = '';
    ALL_SEATS.forEach(seatId => {
      const cell = document.createElement('div');
      const entry = result[seatId];
      if (entry) {
        const { studentId, wishRank } = entry;
        cell.className = `cell assigned ${wishClass(wishRank)}`;
        // Tooltip: show all students' ranks for this seat
        const rankInfo = Object.values(subs).map(s => {
          const r = s.ranking.indexOf(seatId) + 1;
          return `${s.studentId}號:志${r}`;
        }).sort((a,b)=>{
          const ra = parseInt(a.split('志')[1]);
          const rb = parseInt(b.split('志')[1]);
          return ra - rb;
        }).slice(0, 5).join(' / ');
        cell.title = `座位${seatId}\n志願競爭：${rankInfo}`;
        cell.innerHTML = `
          <span class="c-seat">${seatId}</span>
          <span class="c-stu">${studentId}</span>
          <span class="c-wish">志${wishRank}</span>
        `;
      } else {
        cell.className = 'cell empty';
        cell.innerHTML = `<span class="c-seat">${seatId}</span>`;
      }
      grid.appendChild(cell);
    });

    // ---- Table ----
    const tbody = document.getElementById('resTbody');
    const rows = Object.entries(result).sort((a, b) => parseInt(a[0].replace('-','')) - parseInt(b[0].replace('-','')));
    tbody.innerHTML = rows.map(([seatId, { studentId, wishRank }]) => `
      <tr>
        <td><strong>${studentId}</strong> 號</td>
        <td>${seatId}</td>
        <td><span class="badge ${badgeClass(wishRank)}">第 ${wishRank} 志願</span></td>
        <td>${emoji(wishRank)} ${wishRank <= 3 ? '非常滿意' : wishRank <= 10 ? '尚可' : '委屈了'}</td>
      </tr>
    `).join('');

    // ---- Wish summary ----
    const cnt = { w1:0, w2:0, w3:0, wm:0, wl:0 };
    Object.values(result).forEach(({ wishRank }) => {
      if (wishRank === 1) cnt.w1++;
      else if (wishRank === 2) cnt.w2++;
      else if (wishRank === 3) cnt.w3++;
      else if (wishRank <= 10) cnt.wm++;
      else cnt.wl++;
    });
    document.getElementById('wishSummary').innerHTML = `
      <span style="color:#4ade80">第1志願：${cnt.w1}人</span>
      <span style="color:#6ee7b7">第2志願：${cnt.w2}人</span>
      <span style="color:#a7f3d0">第3志願：${cnt.w3}人</span>
      <span style="color:#93c5fd">第4–10志願：${cnt.wm}人</span>
      <span style="color:#fdba74">第11志願以後：${cnt.wl}人</span>
    `;

    document.getElementById('resCard').style.display = 'block';
    document.getElementById('reBtn').style.display = 'inline-block';
  }

  document.getElementById('assignBtn').addEventListener('click', () => render(assign()));
  document.getElementById('reBtn').addEventListener('click', () => render(assign()));

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel' + tab.dataset.panel.charAt(0).toUpperCase() + tab.dataset.panel.slice(1)).classList.add('active');
    });
  });

  // Clear all
  document.getElementById('clearBtn').addEventListener('click', async () => {
    if (!confirm('確定要清除所有學生的志願資料？此動作無法復原！')) return;
    const snap = await getDocs(collection(db, 'seat_preferences'));
    for (const d of snap.docs) await deleteDoc(d.ref);
    document.getElementById('resCard').style.display = 'none';
    document.getElementById('reBtn').style.display = 'none';
  });
</script>
</body>
</html>
